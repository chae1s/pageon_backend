name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: application-prod.yml 생성
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application-prod.yml << 'EOF'
          spring:
            datasource:
              url: ${{ secrets.DB_URL }}
              username: ${{ secrets.DB_USERNAME }}
              password: ${{ secrets.DB_PASSWORD }}
              hikari:
                maximum-pool-size: 13
            security:
              oauth2:
                client:
                  registration:
                    kakao:
                      client-id: ${{ secrets.KAKAO_CLIENT_ID }}
                      client-secret: ${{ secrets.KAKAO_CLIENT_SECRET }}
                      redirect-uri: http://${{ secrets.EC2_HOST }}/login/oauth2/code/kakao
                    naver:
                      client-id: ${{ secrets.NAVER_CLIENT_ID }}
                      client-secret: ${{ secrets.NAVER_CLIENT_SECRET }}
                      redirect-uri: http://${{ secrets.EC2_HOST }}/login/oauth2/code/naver
                    google:
                      client-id: ${{ secrets.GOOGLE_CLIENT_ID }}
                      client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
                      redirect-uri: http://${{ secrets.EC2_HOST }}/login/oauth2/code/google
            mail:
              username: gopageon@gmail.com
              password: ${{ secrets.MAIL_PASSWORD }}
            data:
              redis:
                host: redis
                port: 6379
            kafka:
              bootstrap-servers: kafka:9092
          jwt:
            secret:
              refresh: ${{ secrets.JWT_REFRESH_SECRET }}
              access: ${{ secrets.JWT_ACCESS_SECRET }}
          cloud:
            aws:
              s3:
                bucket: pageon-bucket
                cloudfront-url: https://d2ge55k9wic00e.cloudfront.net
              stack:
                auto: false
              region:
                static: ap-northeast-2
              credentials:
                accessKey: ${{ secrets.AWS_ACCESS_KEY }}
                secretKey: ${{ secrets.AWS_SECRET_KEY }}
          cdn:
            cloudfront:
              domain: ${{ secrets.CDN_DOMAIN }}
              keypair-id: ${{ secrets.CDN_KEYPAIR_ID }}
              private-key-path: classpath:keys/private_key.pem
              url-expire-minutes: 30
          error:
            printStackTrace: false
          portone:
            api-secret: ${{ secrets.PORTONE_API_SECRET }}
          coolsms:
            api-key: ${{ secrets.COOLSMS_API_KEY }}
            api-secret: ${{ secrets.COOLSMS_API_SECRET }}
            domain: https://api.solapi.com
            set-from: ${{ secrets.COOLSMS_FROM }}
          app:
            image-delivery:
              mode: proxy
              allowed-hosts: [d2ge55k9wic00e.cloudfront.net]
          logging:
            level:
              root: INFO
          payment:
            toss:
              client-key: ${{ secrets.TOSS_CLIENT_KEY }}
              secret-key: ${{ secrets.TOSS_SECRET_KEY }}
              api-url: https://api.tosspayments.com
          encryption:
            secret-key: ${{ secrets.ENCRYPTION_SECRET_KEY }}
          EOF

      - name: CDN private key 파일 생성
        run: |
          mkdir -p src/main/resources/keys
          echo "${{ secrets.CDN_PRIVATE_KEY }}" > src/main/resources/keys/private_key.pem

      - name: Gradle 빌드
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: Docker 이미지 빌드
        run: |
          docker build -t pageon-backend:latest .

      - name: Docker 이미지 저장
        run: |
          docker save pageon-backend:latest | gzip > pageon-backend.tar.gz

      - name: EC2에 파일 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "pageon-backend.tar.gz,docker-compose.prod.yml,prometheus"
          target: "/home/ubuntu/app"

      - name: EC2에서 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            docker load < pageon-backend.tar.gz
            /usr/local/bin/docker-compose -f docker-compose.prod.yml down
            /usr/local/bin/docker-compose -f docker-compose.prod.yml up -d
            docker image prune -f